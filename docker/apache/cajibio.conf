# Configuración de Apache para servir Morales desde subdirectorio /morales

# Alias para servir la aplicación desde /morales/
Alias /morales /var/www/html

<Directory /var/www/html>
    Options Indexes FollowSymLinks
    AllowOverride All
    Require all granted
    
    # Habilitar rewrite
    <IfModule mod_rewrite.c>
        RewriteEngine On
        RewriteBase /morales/
        
        # Redirigir todo excepto archivos/directorios existentes a index.php
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^(.*)$ index.php/$1 [L]
    </IfModule>
</Directory>
